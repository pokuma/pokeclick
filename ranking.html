<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="Ranking" content="Ranking page">
    <meta charset="utf-8">
    <meta name="theme-color" content="rgb(83, 82, 82);" />
    <link rel="icon" type="image/x-icon" href="assets/images/logo/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Ranking</title>
    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link href="assets/styles/styles.css" media="all" rel="stylesheet" type="text/css" />

    <link href="assets/styles/ranking.css" media="all" rel="stylesheet" type="text/css" />

    <script>
        function start () {
            loadDarkMode();
            reloadRanking();
        }
    </script>
</head>

<body id="body" onload="start()" >
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
        <div class="container-fluid">
            <a class="nav-link" draggable="false" href="index.html"><img id="navBarLogo"
                    src="assets/images/logo/logo.png" draggable="false" style="width: 100px;" alt="logo"></a>

            <a class="nav-link" draggable="false" href="game.html"><img id="navBarLogo"
                    src="assets/images/faq/BackToGame.png" draggable="false"
                    style="width: 300px; padding-left: 0px; padding-right: 25px;" alt="logo"></a>

            <div class="row">
                <div class="col">
                    <div class="nightmode-toggle hide-for-small-down align-content-center d-flex">
                        <i class="fa fa-sun-o text-light"> </i>
                        <label for="dark-mode-toggle" class="switch" title="Switch control" tabindex="0">
                            <input type="checkbox" id="dark-mode-toggle" onclick="changeDarkMode()">
                            <span class="slider round clickable"> </span>
                        </label>
                        <i class="fa fa-moon-o text-light"> </i>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <h1>
        <img draggable="false" src="assets\images\ranking\ranking.png" alt="Options" width="170"
            style="display: block;  margin: 50px auto 0; padding-bottom:30px" tabindex="0" alt="Ranking">
    </h1>
    <div class="table-container">
        
        <table
            class="table table-page-1 table-sort-tier col-lg-3 p-3 justify-content-center align-items-center text-light border-light bg-dark order-2 m-2 m-lg-auto ranking-table">

            <thead>
                <tr>
                    <td class="rank" tabindex="0">Rank</td>
                    <td class="updown"></td>
                    <td class="name" tabindex="0">Name</td>
                    <td class="level" tabindex="0">Level</td>
                    <td class="pokedex" tabindex="0">
                        <i class="fas fa-sort-amount-down"></i>
                        Pokedex
                    </td>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>
        
    </div>

    <!--Ion icons-->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script defer src="public/main/private/script.js"></script>
    <script defer src="public/main/private/login.js"></script>
    <script defer src="public/main/private/ranking.js"></script>
</body>

</html>
